name: Morning Report

on:
  schedule:
    # Daily 7 AM PDT (14:00 UTC). Targets 7 AM but GitHub's cron is best-effort
    # and tends to fire ~1-2h late, so the report typically lands ~8-9 AM.
    # Early/late is fine — the post itself is timestamped (see morning_report.py).
    - cron: '0 14 * * *'
    # Redundancy: run again 5 min later in case first one is skipped
    - cron: '5 14 * * *'
    # Sunday 9 PM PDT (04:00 UTC Monday) — weekly 2-start wire sweep
    - cron: '0 4 * * 1'
    # Redundancy: run again 5 min later
    - cron: '5 4 * * 1'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to run for (YYYY-MM-DD). Leave blank for today.'
        required: false
      report:
        description: 'Which report to run: daily or sunday'
        required: false
        default: daily
        type: choice
        options: [daily, sunday]

jobs:
  morning-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas requests espn-api

      - name: Run report
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ESPN_S2:             ${{ secrets.ESPN_S2 }}
          ESPN_SWID:           ${{ secrets.ESPN_SWID }}
          ESPN_LEAGUE_ID:      ${{ secrets.ESPN_LEAGUE_ID }}
          ESPN_TEAM_ID:        ${{ secrets.ESPN_TEAM_ID }}
          DRAFT_DATE:          ${{ vars.DRAFT_DATE }}
        # The Sunday-night cron (04:00 UTC Monday) runs the 2-start wire sweep;
        # all other schedules run the daily morning report. A manual dispatch can
        # force either via the `report` input.
        run: |
          SCHEDULE='${{ github.event.schedule }}'
          REPORT='${{ github.event.inputs.report }}'
          DATE='${{ github.event.inputs.date }}'
          if [ "$REPORT" = "sunday" ] || [ "$SCHEDULE" = "0 4 * * 1" ] || [ "$SCHEDULE" = "5 4 * * 1" ]; then
            python sunday_sweep.py ${DATE:+"$DATE"}
          else
            python morning_report.py ${DATE:+"$DATE"}
          fi
