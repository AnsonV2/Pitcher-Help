name: Morning Report

on:
  schedule:
    # Daily 7 AM PDT (14:00 UTC). Targets 7 AM but GitHub's cron is best-effort
    # and tends to fire ~1-2h late, so the report typically lands ~8-9 AM.
    # Early/late is fine — the post itself is timestamped (see morning_report.py).
    - cron: '0 14 * * *'
    # Redundancy: run again 5 min later in case first one is skipped
    - cron: '5 14 * * *'
    # Sunday 9 PM PDT (04:00 UTC Monday) — weekly sweep
    - cron: '0 4 * * 1'
    # Redundancy: run again 5 min later
    - cron: '5 4 * * 1'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to run for (YYYY-MM-DD). Leave blank for today.'
        required: false

jobs:
  morning-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas requests espn-api

      - name: Run morning report
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ESPN_S2:             ${{ secrets.ESPN_S2 }}
          ESPN_SWID:           ${{ secrets.ESPN_SWID }}
          ESPN_LEAGUE_ID:      ${{ secrets.ESPN_LEAGUE_ID }}
          ESPN_TEAM_ID:        ${{ secrets.ESPN_TEAM_ID }}
          DRAFT_DATE:          ${{ vars.DRAFT_DATE }}
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python morning_report.py "${{ github.event.inputs.date }}"
          else
            python morning_report.py
          fi
